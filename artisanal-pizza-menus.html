<style>
:root{--ease:cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#050508;color:#fff;min-height:100vh}

/* ─── Dashboard Shell ─── */
.dash-header{text-align:center;padding:80px 20px 50px;position:relative;overflow:hidden}
.dash-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(180,120,60,.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 100%,rgba(160,60,30,.08) 0%,transparent 50%);pointer-events:none}
.dash-header h1{font-family:'Cinzel',serif;font-size:3rem;font-weight:400;letter-spacing:8px;text-transform:uppercase;background:linear-gradient(135deg,#e8c17a 0%,#f5dfa3 40%,#c9953c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative}
.dash-header p{color:#666;font-size:1rem;font-weight:300;margin-top:12px;letter-spacing:2px}
.dash-header .line{width:120px;height:1px;background:linear-gradient(90deg,transparent,#c9953c,transparent);margin:20px auto 0}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:28px;padding:30px 40px 60px;max-width:1700px;margin:0 auto}
.card{border-radius:12px;overflow:hidden;background:#0c0c10;border:1px solid rgba(255,255,255,.04);transition:transform .4s var(--ease),box-shadow .4s var(--ease);cursor:pointer;position:relative}
.card::after{content:'';position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .4s;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.8));pointer-events:none}
.card:hover{transform:translateY(-8px) scale(1.01);box-shadow:0 30px 80px rgba(0,0,0,.6)}
.card:hover::after{opacity:1}
.card-label{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:2}
.card-label .num{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:3px;color:#c9953c}
.card-label .theme-name{font-weight:500;font-size:.85rem;letter-spacing:1px}
.card-label .badge{font-size:.6rem;padding:4px 14px;border-radius:2px;font-weight:600;text-transform:uppercase;letter-spacing:2px;border:1px solid}
.menu-preview{height:560px;overflow:hidden;position:relative}
.menu-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(transparent,#0c0c10);pointer-events:none}

/* ─── Modal ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;overflow-y:auto;padding:30px}
.modal-overlay.active{display:flex;flex-direction:column;align-items:center}
.modal-bar{position:sticky;top:0;z-index:1001;display:flex;gap:14px;padding:14px 24px;background:rgba(12,12,16,.9);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:24px}
.modal-bar button{padding:10px 28px;border:none;border-radius:6px;font-family:'Poppins',sans-serif;font-weight:500;cursor:pointer;font-size:.85rem;transition:all .2s;letter-spacing:1px}
.btn-dl{background:linear-gradient(135deg,#c9953c,#e8c17a);color:#1a1a1a}
.btn-dl:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(201,149,60,.4)}
.btn-x{background:rgba(255,255,255,.06);color:#aaa;border:1px solid rgba(255,255,255,.08) !important}
.btn-x:hover{background:rgba(255,255,255,.12);color:#fff}
.modal-body{max-width:960px;width:100%}
.dl-loader{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9999;color:#fff;font-size:1.1rem;font-family:'Poppins',sans-serif;letter-spacing:2px}
.dl-loader .spin{width:36px;height:36px;border:2px solid #333;border-top-color:#c9953c;border-radius:50%;animation:sp .7s linear infinite;margin-right:18px}
@keyframes sp{to{transform:rotate(360deg)}}

// Build cards
var grid=document.getElementById("cardGrid");
THEMES.forEach(function(t){
  var card=mk("div","card");
  card.addEventListener("click",function(){openModal(t.id)});
  var prev=mk("div","menu-preview");
  prev.appendChild(buildMenu(t.id));
  card.appendChild(prev);
  var lbl=mk("div","card-label");
  lbl.appendChild(mk("span","num","0"+t.id));
  lbl.appendChild(mk("span","theme-name",t.name));
  var bdg=mk("span","badge",t.badge);
  bdg.style.borderColor=t.bc;bdg.style.color=t.tc;
  lbl.appendChild(bdg);
  card.appendChild(lbl);
  grid.appendChild(card);
});

var currentId=null;
function openModal(id){
  currentId=id;
  var m=document.getElementById("modal");
  var c=document.getElementById("modalContent");
  while(c.firstChild)c.removeChild(c.firstChild);
  c.appendChild(buildMenu(id));
  m.classList.add("active");
  document.body.style.overflow="hidden";
}
function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.body.style.overflow="";
  currentId=null;
}
document.getElementById("closeBtn").addEventListener("click",closeModal);
document.getElementById("downloadBtn").addEventListener("click",downloadMenu);
document.getElementById("modal").addEventListener("click",function(e){if(e.target===document.getElementById("modal"))closeModal()});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});

function downloadMenu(){
  var c=document.getElementById("modalContent");
  var ld=document.getElementById("loadingOverlay");
  ld.style.display="flex";
  html2canvas(c.firstElementChild,{scale:3,useCORS:true,backgroundColor:null,logging:false}).then(function(canvas){
    var a=document.createElement("a");
    var th=THEMES.find(function(t){return t.id===currentId});
    a.download="artisanal-pizza-"+currentId+"-"+th.name.toLowerCase().replace(/\s+/g,"-")+".png";
    a.href=canvas.toDataURL("image/png");
    a.click();
    ld.style.display="none";
  }).catch(function(err){
    alert("Download failed: "+err.message);
    ld.style.display="none";
  });
}
